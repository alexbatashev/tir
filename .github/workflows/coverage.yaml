name: Code Coverage

on:
  merge_group:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_INCREMENTAL: "0"
  SCCACHE_GHA_ENABLED: "true"
  RUSTC_WRAPPER: sccache

permissions:
  contents: read

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install coverage tools
        if: github.event_name == 'push'
        run: rustup component add llvm-tools-preview
      - uses: taiki-e/install-action@nextest
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --verbose
        env:
          RUSTFLAGS: ${{ github.event_name == 'push' && '-C instrument-coverage --deny warnings' || '--deny warnings' }}
          RUSTDOCFLAGS: ${{ github.event_name == 'push' && '-C instrument-coverage' || '' }}
      - name: Run cargo tests
        # The FileCheck-style `lit` suites run as ordinary integration tests, so
        # this also exercises the check tests.
        run: cargo nextest r -v
        env:
          RUSTFLAGS: ${{ github.event_name == 'push' && '-C instrument-coverage --deny warnings' || '--deny warnings' }}
          RUSTDOCFLAGS: ${{ github.event_name == 'push' && '-C instrument-coverage' || '' }}
      - uses: taiki-e/install-action@grcov
        if: github.event_name == 'push'
      - name: Run grcov
        if: github.event_name == 'push'
        run: |
          grcov . --binary-path target/debug/ -s . -t lcov --branch --llvm \
              --ignore '../*' \
              --ignore "/*" \
              --ignore 'target/*' \
              --ignore 'utils/*' \
              --ignore 'xtask/*' \
              --ignore '**/tests/**' \
              -o lcov.info
      - name: Coveralls
        if: github.event_name == 'push'
        uses: coverallsapp/github-action@v2
