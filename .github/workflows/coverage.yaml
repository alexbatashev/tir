name: Code Coverage

on:
  merge_group:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: line-tables-only

permissions:
  contents: read

jobs:
  binaries:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: --deny warnings
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_RW_MODE: ${{ github.event_name == 'push' && 'READ_WRITE' || 'READ_ONLY' }}
      SCCACHE_GHA_VERSION: precommit-v1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name == 'push' }}
      - run: cargo build --workspace --locked

  tests:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: --deny warnings
      RUSTDOCFLAGS: --deny warnings
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_GHA_RW_MODE: ${{ github.event_name == 'push' && 'READ_WRITE' || 'READ_ONLY' }}
      SCCACHE_GHA_VERSION: precommit-v1
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.event_name == 'push' }}
      # The FileCheck-style `lit` suites run as ordinary integration tests.
      - run: cargo nextest run --workspace --locked

  build:
    if: always()
    needs: [binaries, tests]
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Require binaries and tests
        run: |
          test '${{ needs.binaries.result }}' = success
          test '${{ needs.tests.result }}' = success

  coverage:
    if: github.event_name == 'push'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: -C instrument-coverage --deny warnings
      RUSTDOCFLAGS: -C instrument-coverage
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - run: cargo nextest run --workspace --locked
      - uses: taiki-e/install-action@grcov
      - name: Run grcov
        run: |
          grcov . --binary-path target/debug/ -s . -t lcov --branch --llvm \
              --ignore '../*' \
              --ignore "/*" \
              --ignore 'target/*' \
              --ignore 'utils/*' \
              --ignore 'xtask/*' \
              --ignore '**/tests/**' \
              -o lcov.info
      - name: Coveralls
        uses: coverallsapp/github-action@v2
