name: ISel axioms

on:
  merge_group:
  pull_request:
    branches: ["master"]
    paths:
      - "backends/*/defs/**"
      - "core/src/sem.rs"
      - "core/src/sem/**"
      - "core/src/backend/isel/**"
      - "backends/*/src/isel.axioms"
      - "backends/*/src/isel.coverage"
      - "tools/src/axioms.rs"
      - "xtask/src/main.rs"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Rediscover every backend's bridge axioms and coverage matrix from the
  # instruction definitions and re-prove each width instantiation, failing when
  # a committed `isel.axioms` / `isel.coverage` is stale (run `cargo xtask
  # axioms` locally to refresh). Release mode keeps the in-tree proofs fast.
  discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo xtask axioms
